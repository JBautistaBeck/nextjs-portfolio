name: Blog page displays articles in grid layout with archive option
page: /blog
page_path: app/blog/page.tsx
task: Verify blog page shows list of all blog posts
steps:
- Navigate to the blog page
- Verify page heading shows 'Latest Articles'
- "Verify 'View Archive \u2192' option is present"
- Verify blog posts are displayed in a grid layout (1 column on mobile, 2 columns
  on larger screens)
- Verify each blog post is displayed as a card with border and hover effect
- "Verify each blog post shows title, publish date, summary, and 'Read more \u2192\
  ' link"
expected_result: Blog page displays a grid of articles with titles, summaries, publish
  dates, and a "Read more" link for each post, along with an archive option
