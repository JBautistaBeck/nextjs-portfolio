name: Home page loads correctly with enhanced layout
page: /
page_path: app/page.tsx
task: Verify home page loads and displays content
steps:
- Navigate to the home page
- Verify navigation bar is visible
- Verify welcome section with 'Welcome to My Portfolio' heading
- Verify 'View All Articles' button is present
- Verify 'Latest Posts' section heading
- Verify blog posts are displayed in a grid layout
- Verify posts have article tags and 'Read more' links
- Verify footer is visible
expected_result: Home page loads with navigation bar, welcome section, latest posts
  in grid layout, and footer
