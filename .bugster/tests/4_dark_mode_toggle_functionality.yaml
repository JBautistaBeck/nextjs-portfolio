name: Dark mode toggle functionality
page: /
page_path: app/page.tsx
task: Verify theme switching between light and dark modes
steps:
- Navigate to the home page
- Observe the current theme (light or dark)
- Note the styling of blog post cards (background color, text color, and border)
- Click on the theme toggle button in the navigation
- Verify the theme changes to the opposite mode (dark or light)
- Verify blog post cards now display with the opposite theme colors (dark background/light
  text or light background/dark text)
- Verify blog post cards show proper border colors (neutral-800 in dark mode, neutral-200
  in light mode)
- Verify 'Read more' text is blue-400 in dark mode and blue-600 in light mode
- Verify content remains visible and properly styled in the new theme
expected_result: Site theme changes between light and dark modes when toggled, with
  proper styling applied to blog post cards including background colors, text colors,
  and borders
